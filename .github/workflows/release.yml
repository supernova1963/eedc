name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          # Extract section between current version header and next version header
          NOTES=$(sed -n "/^## \[${{ steps.version.outputs.VERSION }}\]/,/^## \[/{/^## \[/!p}" CHANGELOG.md)
          # Write to file for gh release
          echo "$NOTES" > /tmp/release-notes.md

      - name: Create or update GitHub Release
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "$GITHUB_REF_NAME" > /dev/null 2>&1; then
            echo "Release $GITHUB_REF_NAME already exists, updating notes..."
            gh release edit "$GITHUB_REF_NAME" \
              --title "eedc $GITHUB_REF_NAME" \
              --notes-file /tmp/release-notes.md
          else
            gh release create "$GITHUB_REF_NAME" \
              --title "eedc $GITHUB_REF_NAME" \
              --notes-file /tmp/release-notes.md
          fi

  # Multi-Platform Docker: native Builds statt QEMU-Emulation
  # Vermeidet 6h-Timeout-Hänger bei ARM64 via QEMU
  build:
    runs-on: ${{ matrix.runner }}
    needs: release
    strategy:
      matrix:
        include:
          - platform: linux/amd64
            runner: ubuntu-latest
          - platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push platform image
        id: build
        uses: docker/build-push-action@v6
        timeout-minutes: 30
        with:
          context: .
          push: false
          outputs: type=image,"name=ghcr.io/supernova1963/eedc",push-by-digest=true,name-canonical=true,push=true
          platforms: ${{ matrix.platform }}
          cache-from: type=gha,scope=${{ matrix.platform }}
          cache-to: type=gha,scope=${{ matrix.platform }},mode=max

      - name: Export digest
        run: |
          mkdir -p /tmp/digests
          digest="${{ steps.build.outputs.digest }}"
          touch "/tmp/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digest-${{ matrix.runner }}
          path: /tmp/digests/*
          if-no-files-found: error
          retention-days: 1

  # Manifest zusammenführen: ein Multi-Arch Image aus den Plattform-Digests
  merge:
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: /tmp/digests
          pattern: digest-*
          merge-multiple: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Create and push manifest
        run: |
          TAGS="-t ghcr.io/supernova1963/eedc:${{ steps.version.outputs.VERSION }} -t ghcr.io/supernova1963/eedc:latest"
          SOURCES=$(printf 'ghcr.io/supernova1963/eedc@sha256:%s ' $(ls /tmp/digests/))
          docker buildx imagetools create $TAGS $SOURCES
